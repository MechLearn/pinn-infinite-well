# OE2 — ruido en puntos de colocación.
# Hereda arquitectura/seed de base.yaml; save_dir, experiment_name y noise_sigma
# se sobreescriben en tiempo de ejecución por scripts/run_sweep_noise.py.

save_dir: outputs/InfiniteWell/noise/runs
experiment_name: A1
seed: 0

model:
  hidden: 128
  use_sine: true

noise_sigma: 0.0
noise_resample_every_epoch: false

train:
  n_col_min: 1024
  n_col_per_n: 2048
  clipnorm: 1.0

  epochs:
    n1: 4000
    n2: 6000
    n3: 9000
    n_ge4: 15000

  lr:
    n1: 1e-3
    n2: 7e-4
    n3: 5e-4
    n_ge4: 3e-4

loss:
  lam:
    low_modes: [40.0, 10.0]
    n2: [40.0, 15.0]
    high_modes: [300.0, 80.0]
